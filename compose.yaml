---
# Docker Compose for codescene-lite
# Usage:
#   docker compose up --build     # build and start
#   docker compose up             # start with existing image
#   docker compose down -v        # stop and remove volumes

services:
  codescene-lite:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: codescene-lite:latest
    container_name: codescene-lite
    ports:
      - "7777:7777"
    volumes:
      # Persist EDN store (repos + analysis results) across restarts
      - codescene-data:/data
      # Local repo directories mounted read-only for git log access
      - ${HOME}/learning:/repos/learning:ro
      - ${HOME}/work:/repos/work:ro
    environment:
      - JAVA_OPTS=-Xmx4g -Xss512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Dev: nREPL server for clojure-mcp ──────────────────────────────────────
  # Start with: docker compose --profile dev up codescene-dev
  # Connect clojure-mcp to: localhost:7888
  codescene-dev:
    image: clojure:temurin-21-tools-deps
    working_dir: /app
    ports:
      - "127.0.0.1:7888:7888"
    volumes:
      - .:/app
      - ${HOME}/.m2:/root/.m2
      - ${HOME}/learning:/repos/learning:ro
      - ${HOME}/work:/repos/work:ro
    command: ["clojure", "-M:nrepl"]
    profiles:
      - dev

volumes:
  codescene-data:
    driver: local
